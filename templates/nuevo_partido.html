{% extends "base.html" %}

{% block titulo %}
Nuevo Partido
{% endblock %}

{% block contenido %}

<div class="container mt-4">

    <h1 class="text-center mb-4 text-white">
        ⚽ Nuevo Partido
    </h1>

    <div class="card">

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Equipo Local
                    </label>

                    <input type="text"
                           name="local"
                           class="form-control"
                           placeholder="Ej: México"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Equipo Visitante
                    </label>

                    <input type="text"
                           name="visitante"
                           class="form-control"
                           placeholder="Ej: Sudáfrica"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Fecha
                    </label>

                    <input type="date"
                           name="fecha"
                           class="form-control"
                           required>

                </div>

                <div class="d-grid gap-2">

                    <button class="btn btn-success btn-lg">
                        💾 Guardar Partido
                    </button>

                    <a href="/partidos"
                       class="btn btn-secondary">

                        ← Volver a Partidos

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
