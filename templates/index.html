<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundialista</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center">
        🏆 Quiniela Mundialista 2026
    </h1>

    <p class="text-center text-muted">
        Panel principal
    </p>

    <hr>

    <div class="row mt-4">

        <div class="col-md-3">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>⚽ Partidos</h5>
                    <p>Administrar partidos.</p>

                    <a href="/partidos"
                       class="btn btn-primary">
                        Abrir
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>👥 Participantes</h5>
                    <p>Gestionar participantes.</p>

                    <a href="/participantes"
                       class="btn btn-success">
                        Abrir
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>🏅 Tabla General</h5>
                    <p>Clasificación de puntos.</p>

                    <a href="#"
                       class="btn btn-warning">
                        Próximamente
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>🎯 Ganadores</h5>
                    <p>Ganadores por partido.</p>

                    <a href="/partidos"
                       class="btn btn-info">
                        Ver Partidos
                    </a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
