{% extends "base.html" %}

{% block titulo %}
Participantes
{% endblock %}

{% block contenido %}

<div class="container mt-4">

    <h1 class="text-center mb-4 text-white">
        👥 Participantes
    </h1>

    <div class="card mb-4">

        <div class="card-body">

            <h4 class="mb-3">
                ➕ Agregar Participante
            </h4>

            <form method="POST">

                <div class="row g-3">

                    <div class="col-md-5">

                        <input type="text"
                               name="nombre"
                               class="form-control"
                               placeholder="Nombre"
                               required>

                    </div>

                    <div class="col-md-5">

                        <input type="text"
                               name="apellido"
                               class="form-control"
                               placeholder="Apellido"
                               required>

                    </div>

                    <div class="col-md-2 d-grid">

                        <button class="btn btn-success">
                            Agregar
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <div class="card">

        <div class="card-body">

            <h4 class="mb-3">
                Lista de Participantes
            </h4>

            <div class="table-responsive">

                <table class="table table-striped table-bordered align-middle">

                    <thead class="table-dark">

                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Acción</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for p in participantes %}

                        <tr>

                            <td>{{ p[0] }}</td>

                            <td>{{ p[1] }}</td>

                            <td>{{ p[2] }}</td>

                            <td>

                                <a href="/eliminar-participante/{{ p[0] }}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Eliminar participante?')">

                                    Eliminar

                                </a>

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

{% endblock %}
