<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Participantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-3">

        <a href="/" class="btn btn-secondary btn-sm">Inicio</a>

        <a href="/partidos" class="btn btn-primary btn-sm">
        Partidos
        </a>

        <a href="/participantes" class="btn btn-success btn-sm">
        Participantes
        </a>

    </div>

<div class="container mt-5">

    <h1>Participantes</h1>

    <form method="POST">

        <div class="row">

            <div class="col-md-4">
                <input type="text"
                       name="nombre"
                       class="form-control"
                       placeholder="Nombre"
                       required>
            </div>

            <div class="col-md-4">
                <input type="text"
                       name="apellido"
                       class="form-control"
                       placeholder="Apellido"
                       required>
            </div>

            <div class="col-md-4">
                <button class="btn btn-success">
                    Agregar
                </button>
            </div>

        </div>

    </form>

    <hr>

    <table class="table">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Accion</th>
            </tr>
        </thead>

        <tbody>

            {% for p in participantes %}
            <tr>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
                <td>
                    <a href="/eliminar-participante/{{ p[0] }}"
                       class="btn btn-danger btn-sm">
                       Eliminar
                    </a>
                </td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
