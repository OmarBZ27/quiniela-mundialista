<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Partidos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-3">

    <div class="d-grid gap-2">

        <a href="/" class="btn btn-secondary">
            🏠 Inicio
        </a>

        <a href="/partidos" class="btn btn-primary">
            ⚽ Partidos
        </a>

        <a href="/participantes" class="btn btn-success">
            👥 Participantes
        </a>

    </div>

</div>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        ⚽ Partidos Registrados
    </h1>

    <div class="d-grid mb-4">

        <a href="/nuevo-partido"
           class="btn btn-success btn-lg">

            ➕ Nuevo Partido

        </a>

    </div>

    {% for partido in partidos %}

    <div class="card mb-3 shadow-sm">

        <div class="card-body">

            <h4 class="card-title">

                {{ partido[1] }}
                <br>
                vs
                <br>
                {{ partido[2] }}

            </h4>

            <p class="card-text">

                📅 {{ partido[3] }}

            </p>

            <div class="d-grid gap-2">

                <a href="/pronosticos/{{ partido[0] }}"
                   class="btn btn-primary">

                    Pronósticos

                </a>

                <a href="/resultado/{{ partido[0] }}"
                   class="btn btn-success">

                    Resultado

                </a>

                <a href="/ganadores/{{ partido[0] }}"
                   class="btn btn-warning">

                    Ganadores

                </a>

                <a href="/eliminar-partido/{{ partido[0] }}"
                   class="btn btn-danger"
                   onclick="return confirm('¿Eliminar este partido?')">

                    Eliminar

                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
