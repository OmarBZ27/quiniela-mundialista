<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block titulo %}Quiniela Mundialista{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        :root{

            --fifa-coral:#FF4D4D;
            --fifa-turquoise:#00D4C8;
            --fifa-purple:#8B5CF6;
            --fifa-lime:#AAFF00;

            --fifa-dark:#0F172A;
            --fifa-white:#FFFFFF;

        }

        body{

            font-family:'Noto Sans',sans-serif;

            background:
            linear-gradient(
            135deg,
            #b9b9b9 0%,
            #9ad8ff 35%,
            #7e9e86 70%,
            #9e8888 100%
            );

            min-height:100vh;

        }

        .titulo-principal{

            font-family: 'Barlow Condensed',sans-serif;

            font-size:3rem;

            font-weight:800;

            text-transform:uppercase;

            letter-spacing:2px;

            color:white;

        }

        .subtitulo{

            font-family:'Noto Sans',sans-serif;
            
            color:white;

            opacity:.95;

            font-weight:500;
        }

        .card{

            background:black;

            border:none;

            border-radius:32px;

            box-shadow:
            0 10px 35px rgba(0,0,0,.15);

            transition:.25s;

        }

        .card:hover{

            transform:translateY(-4px);

        }


        .btn{

            border-radius:18px;

            font-family:'Noto Sans',sans-serif;

            font-weight:700;
        }

       .navbar-custom{


            background:
            linear-gradient(
                90deg,
                #FF4D4D,
                #8d5cf6,
                #00D4C8,
                #AAFF00
            );

            border:none;

            border-radius:32px;

        }

        .btn-primary{

            background:var(--fifa-purple);
            border:none;

        }

        .btn-success{

            background:var(--fifa-turquoise);
            border:none;
            color:black;

        }

        .btn-warning{

            background:var(--fifa-lime);
            border:none;
            color:black;

        }

        .btn-danger{

            background:var(--fifa-coral);
            border:none;

        }

        .table{
            background:white;
        }

        .partido-card{

            position:relative;
            overflow:hidden;
            border:none;
            border-radius:32px;
            background:white;
            box-shadow:
            0 8px 20px rgba(0,0,0,.8);
        }

        .partido-card::after{
            content:"";
            position:absolute;
            left:0;
            right:0;
            bottom:0;

            height:8px;

            background:
            linear-gradient(
                90deg,
                #FF4D4D,
                #8d5cf6,
                #00D4C8,
                #AAFF00
            );
        }

        .equipo{

            font-family:'Barlow Condensed',sans-serif;
            font-size:2rem;
            font-weight:800;
            text-transform:uppercase;
            
        }

        .vs{

            font-family:"Barlow Condensed",sans-serif;
            font-size:2rem;
            color:#6b7280;
            font-weight:700;
        }

        .fecha.partido{

            font-size:.9rem;
            color:#6b7280;
            font-weight:600;    
        }

        .boton-fila{

            display:grid;
            grid-template-columns:1fr 1 fr;
            gap:10px;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <div class="card navbar-custom mb-4">

        <div class="card-body text-center">


            <div class="text-center">

                <img src="{{ url_for('static', filename='img/logonegro.png') }}"
                    class="mb-3"
                    style="max-height:200px;">

                <h1 class="titulo-principal">
                    QUINIELA MUNDIALISTA 2026
                </h1>

                <p class="subtitulo">
                     🇨🇦 CANADÁ • 🇺🇸 USA • 🇲🇽 MÉXICO
                </p>

                <p class="subtitulo mb-3">
                    FIFA WORLD CUP
                </p>

            </div>


            <div class="d-grid gap-2 d-md-flex justify-content-center">

                <a href="/" class="btn btn-secondary">
                    🏠 Inicio
                </a>

                <a href="/partidos" class="btn btn-primary">
                    ⚽ Partidos
                </a>

                <a href="/participantes" class="btn btn-success">
                    👥 Participantes
                </a>

            </div>

        </div>

    </div>

    {% block contenido %}
    {% endblock %}

</div>

</body>
</html>
