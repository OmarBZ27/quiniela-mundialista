<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block titulo %}Quiniela Mundialista{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;

            background: linear-gradient(
                135deg,
                #001f5c,
                #003f88,
                #5e2ca5
            );

            min-height:100vh;
        }

        .titulo-principal{
            color:white;
            font-weight:700;
        }

        .subtitulo{
            color:#dfe7ff;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,.15);
        }

        .btn{
            border-radius:12px;
            font-weight:600;
        }

        .navbar-custom{
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(10px);
            border-radius:20px;
        }

        .table{
            background:white;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <div class="card navbar-custom mb-4">

        <div class="card-body text-center">

            <h1 class="titulo-principal">
                🏆 Quiniela Mundialista 2026
            </h1>

            <p class="subtitulo mb-3">
                FIFA World Cup 2026
            </p>

            <div class="d-grid gap-2 d-md-flex justify-content-center">

                <a href="/" class="btn btn-secondary">
                    🏠 Inicio
                </a>

                <a href="/partidos" class="btn btn-primary">
                    ⚽ Partidos
                </a>

                <a href="/participantes" class="btn btn-success">
                    👥 Participantes
                </a>

            </div>

        </div>

    </div>

    {% block contenido %}
    {% endblock %}

</div>

</body>
</html>
