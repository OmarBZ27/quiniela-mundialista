<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block titulo %}Quiniela Mundialista{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        body{

                font-family:'Montserrat',sans-serif;

                background:
                linear-gradient(
                    rgba(0,26,114,.85),
                    rgba(122,31,162,.85)
                ),
                url('/static/img/fondo.png');

                background-size:cover;
                background-position:center;
                background-attachment:fixed;

                min-height:100vh;
            }

        .titulo-principal{

             color:white;

            font-weight:800;

            letter-spacing:3px;

            text-transform:uppercase;

        }

        .subtitulo{
            color:#dfe7ff;
        }

        .card{

            border:none;

            border-radius:28px;

            box-shadow:
            0 10px 30px rgba(0,0,0,.25);

            transition:all .25s ease;

        }

        .card:hover{

            transform:translateY(-5px);

        }


        .btn{

            border-radius:18px;

            font-weight:700;

            padding:10px 18px;

        }

       .navbar-custom{

            background:rgba(255,255,255,.15);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.2);

            border-radius:28px;

        }
        
        .table{
            background:white;
        }

        .titulo-principal{
            letter-spacing:2px;
            text-transform:uppercase;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <div class="card navbar-custom mb-4">

        <div class="card-body text-center">


            <div class="text-center">

                <img src="{{ url_for('static', filename='img/logonegro.png') }}"
                    class="mb-3"
                    style="max-height:140px;">

                <h1 class="titulo-principal">
                    QUINIELA MUNDIALISTA 2026
                </h1>

                <p class="subtitulo mb-3">
                    FIFA WORLD CUP
                </p>

            </div>

            <h1 class="titulo-principal">
                FIFA WORLD CUP 2026
            </h1>

            <h3 class="subtitulo">
                Quiniela Mundialista
            </h3>

            <p class="subtitulo mb-3">
                FIFA World Cup 2026
            </p>

            <div class="d-grid gap-2 d-md-flex justify-content-center">

                <a href="/" class="btn btn-secondary">
                    🏠 Inicio
                </a>

                <a href="/partidos" class="btn btn-primary">
                    ⚽ Partidos
                </a>

                <a href="/participantes" class="btn btn-success">
                    👥 Participantes
                </a>

            </div>

        </div>

    </div>

    {% block contenido %}
    {% endblock %}

</div>

</body>
</html>
